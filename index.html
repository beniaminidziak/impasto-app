<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Impasto — Pizza dough made easy</title>
    <meta name="description" content="Pizza dough made easy. An iOS app for everyone.">
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        :root {
            --surface-bg: #FEFAE0;
            --surface-primary: #F5EFCB;
            --text-primary: #283618;
            --text-secondary: #4A5635;
            --accent: #BC6C25;
            --accent-on: #FEFAE0;
            --border: #D9CFA0;

            --space-sm: 0.5rem;
            --space-md: 0.75rem;
            --space-lg: 1rem;
            --space-xl: 1.5rem;
            --space-xxl: 2rem;

            --radius-sm: 6px;

            --font-serif: "New York", "Charter", "Iowan Old Style", Georgia, serif;
            --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --surface-bg: #1A1F12;
                --surface-primary: #232B1A;
                --text-primary: #EDE6CB;
                --text-secondary: #C7C0A4;
                --accent: #D87E33;
                --accent-on: #1A1F12;
                --border: #3F4A2F;
            }
        }

        *, *::before, *::after { box-sizing: border-box; }

        html { scroll-behavior: smooth; }
        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
        }

        body {
            margin: 0;
            background: var(--surface-bg);
            color: var(--text-primary);
            font-family: var(--font-system);
            font-size: 1.0625rem;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .skip-link {
            position: absolute;
            top: -100px;
            left: var(--space-lg);
            background: var(--accent);
            color: var(--accent-on);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.25rem;
            transition: top 0.15s ease;
        }
        .skip-link:focus {
            top: var(--space-md);
            outline: none;
        }

        main {
            max-width: 560px;
            margin: 0 auto;
            padding: calc(var(--space-xxl) * 2) var(--space-xl);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero {
            text-align: center;
            margin-bottom: calc(var(--space-xxl) * 1.5);
        }

        .hero .icon {
            width: auto;
            height: 96px;
            display: block;
            margin: 0 auto var(--space-xl);
        }

        h1 {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 3rem;
            line-height: 1.1;
            color: var(--text-primary);
            margin: 0 0 var(--space-lg);
            letter-spacing: -0.015em;
        }

        .lede {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            line-height: 1.5;
            color: var(--text-secondary);
            margin: 0;
            font-weight: 400;
        }

        nav.pages h2 {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin: 0 0 var(--space-md);
            text-align: center;
        }

        nav.pages ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        nav.pages a {
            display: block;
            padding: var(--space-md) var(--space-lg);
            background: var(--surface-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            text-align: center;
            transition: border-color 0.15s ease, background 0.15s ease;
        }
        nav.pages a:hover {
            border-color: var(--accent);
        }
        nav.pages a:focus-visible {
            outline: 1.5px solid var(--accent);
            outline-offset: 2px;
        }

        footer {
            text-align: center;
            padding: var(--space-xl);
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.25rem; }
            .lede { font-size: 1.125rem; }
            .hero .icon { height: 80px; }
            main { padding-left: var(--space-lg); padding-right: var(--space-lg); }
        }
    </style>
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <main id="main">
        <section class="hero">
            <img src="icon.png" alt="" class="icon">
            <h1>Impasto</h1>
            <p class="lede">
                Pizza dough made easy.
            </p>
        </section>

        <nav class="pages" aria-label="Site pages">
            <h2>Pages</h2>
            <ul>
                <li><a href="privacy/">Privacy Policy</a></li>
            </ul>
        </nav>
    </main>

    <footer>
        <p>© 2026 Beniamin Idziak</p>
    </footer>
</body>
</html>
